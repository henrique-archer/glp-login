<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de Locais • PMMG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-4">
    <h1 class="h4 mb-3">Cadastro de Locais</h1>
    #

      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label" for="codigo">Código</label>
          <input id="codigo" name="codigo" class="form-control" required>
        </div>
        <div class="col-md-5">
          <label class="form-label" for="nome">Nome do Local</label>
          <input id="nome" name="nome" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="id_secretaria">Secretaria</label>
          <select id="id_secretaria" name="id_secretaria" class="form-select" required>
            <option value="">Selecione...</option>
            <option value="3">SECRETARIA DE ADMINISTRAÇÃO</option>
            <option value="8">SECRETARIA DE SERVIÇOS MUNICIPAIS</option>
            <option value="12">SECRETARIA DE ESPORTE E LAZER</option>
            <!-- No back-end, popular dinamicamente a partir de tabSecretaria -->
          </select>
        </div>

        <div class="col-12">
          <label class="form-label" for="endereco">Endereço</label>
          <textarea id="endereco" name="endereco" class="form-control" rows="2" required></textarea>
        </div>

        <div class="col-md-2 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ativo" name="ativo" checked>
            <label class="form-check-label" for="ativo">Ativo</label>
          </div>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary">Salvar</button>
        Voltar</a>
      </div>
    </form>

    <hr class="my-4">

    <h2 class="h6">Locais (lista de exemplo)</h2>
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead><tr><th>#</th><th>Código</th><th>Local</th><th>Secretaria</th><th>Status</th><th style="width:120px">Ações</th></tr></thead>
        <tbody>
          <tr><td>12</td><td>03.01.859</td><td>ALMOXARIFADO CENTRAL</td><td>S.A.</td><td><span class="badge bg-success">Ativo</span></td><td>Editar | Remover</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
