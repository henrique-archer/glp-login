      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label" for="material">Material</label>
          <input id="material" name="material" class="form-control" value="GÁS LIQUEFEITO DE PETRÓLEO" required>
        </div>
        <div class="col-md-3">
          <label class="form-label" for="tamanho">Tamanho</label>
          <select id="tamanho" name="tamanho" class="form-select" required>
            <option value="">Selecione...</option>
            <option value="P-13">P-13</option>
            <option value="P-45">P-45</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label" for="unidade">Unidade</label>
          <select id="unidade" name="unidade" class="form-select" required>
            <option value="">Selecione...</option>
            <option value="un">un</option>
            <option value="carga">carga</option>
          </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ativo" name="ativo" checked>
            <label class="form-check-label" for="ativo">Ativo</label>
          </div>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary">Salvar</button>
