<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Requisição de GLP • Prefeitura Municipal de Mogi Guaçu</title>

  <!-- Bootstrap 5 (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  />

  <!-- Estilo mínimo para identidade e contraste -->
  <style>
    :root{
      --brand-primary: #134074;   /* Azul institucional */
      --brand-secondary: #0B2545; /* Azul escuro */
      --brand-accent: #3DA9FC;    /* Acento */
    }
    body{
      min-height: 100vh;
      background: linear-gradient(180deg, #f6f9fc 0%, #eef2f7 100%);
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }
    .card-login{
      max-width: 460px;
      width: 100%;
      border: 1px solid #e5eaf1;
      box-shadow: 0 8px 28px rgba(16, 24, 40, 0.08);
      border-radius: 12px;
    }
    .brand-title{
      color: var(--brand-secondary);
      font-weight: 700;
      letter-spacing: .2px;
    }
    .brand-subtitle{
      color: var(--brand-primary);
      font-weight: 600;
    }
    .btn-login{
      background: var(--brand-primary);
      border-color: var(--brand-primary);
    }
    .btn-login:hover{
      background: #0d315e;
      border-color: #0d315e;
    }
    footer{
      color:#56627a;
      font-size: .9rem;
      line-height: 1.2rem;
    }
    .muted-link{ color:#375a7f; text-decoration:none; }
    .muted-link:hover{ text-decoration:underline; }
  </style>
</head>
<body>

  <main class="container px-3">
    <div class="card card-login mx-auto">
      <div class="card-body p-4 p-md-5">

        <!-- Cabeçalho institucional -->
        <header class="text-center mb-4">
          <h1 class="h4 brand-title mb-1">Prefeitura Municipal de Mogi Guaçu</h1>
          <p class="brand-subtitle mb-0">Requisição de carga de gás G.L.P.</p>
        </header>

        <!-- Formulário (sem back-end ainda; pronto para evoluir depois) -->
        <form method="post" action="#" novalidate>
          <div class="mb-3">
            <label for="usuario" class="form-label">Usuário</label>
            <input type="text"
                   class="form-control"
                   id="usuario"
                   name="usuario"
                   inputmode="email"
                   autocomplete="username"
                   placeholder="e-mail institucional ou CPF"
                   required>
          </div>

          <div class="mb-2">
            <label for="senha" class="form-label">Senha</label>
            <div class="input-group">
              <input type="password"
                     class="form-control"
                     id="senha"
                     name="senha"
                     autocomplete="current-password"
                     placeholder="Digite sua senha"
                     required>
              <button class="btn btn-outline-secondary" type="button" id="togglePass" aria-label="Mostrar/ocultar senha" title="Mostrar/ocultar senha">
                👁️
              </button>
            </div>
          </div>

          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary btn-login">Entrar</button>
          </div>

          <!-- Links auxiliares (placeholders por enquanto) -->
          <div class="d-flex justify-content-between mt-3">
            <a class="muted-link" href="#" aria-disabled="true">Primeiro acesso? Faça seu cadastro</a>
            <a class="muted-link" href="#" aria-disabled="true">Esqueci minha senha</a>
          </div>
        </form>

        <!-- Rodapé institucional -->
        <div class="mt-4 text-center">
          <footer>
            <div>Almoxarifado Central</div>
            <div>Secretaria de Administração</div>
            <div class="mt-2 text-muted">
              &copy; <span id="ano"></span> Prefeitura Municipal de Mogi Guaçu. Todos os direitos reservados.
            </div>
          </footer>
        </div>

      </div>
    </div>
  </main>

  <!-- JS mínimo -->
  <script>
    // Atualiza ano automaticamente
    document.getElementById('ano').textContent = new Date().getFullYear();

    // Mostrar/Ocultar senha
    const btn = document.getElementById('togglePass');
    const pwd = document.getElementById('senha');
    btn.addEventListener('click', () => {
      const showing = pwd.type === 'text';
      pwd.type = showing ? 'password' : 'text';
      btn.setAttribute('aria-pressed', String(!showing));
    });
  </script>

  <!-- Bootstrap JS (opcional, útil futuramente) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"
  ></script>
</body>
</html>
